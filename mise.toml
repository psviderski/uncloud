[settings]
experimental = true

[tools]
"aqua:vektra/mockery" = "3.5.3"
go = "1.26.1"
golangci-lint = "2.11.2"
node = "22.20.0"
protoc = "27.3"
protoc-gen-go = "1.34.2"
protoc-gen-go-grpc = "1.5.1"

[vars]
ucind_image = "ghcr.io/psviderski/ucind:latest"

[env]
_.file = ".env"

### Builds: uncloudd
[tasks."build:uncloudd-amd64"]
description = "Build uncloudd for linux/amd64"
run = "mise run build:uncloudd amd64"
outputs = ["uncloudd-linux-amd64"]

[tasks."build:uncloudd-arm64"]
description = "Build uncloudd for linux/arm64"
run = "mise run build:uncloudd arm64"
outputs = ["uncloudd-linux-arm64"]

### Builds: uncloud CLI
[tasks."build:uncloud-linux-amd64"]
description = "Build uncloud CLI for linux/amd64"
run = "mise run build:uncloud linux amd64"
outputs = ["uncloud-linux-amd64"]

[tasks."build:uncloud-linux-arm64"]
description = "Build uncloud CLI for linux/arm64"
run = "mise run build:uncloud linux arm64"
outputs = ["uncloud-linux-arm64"]

[tasks."build:uncloud-macos-amd64"]
description = "Build uncloud CLI for macOS/amd64"
run = "mise run build:uncloud macos amd64"
outputs = ["uncloud-macos-amd64"]

[tasks."build:uncloud-macos-arm64"]
description = "Build uncloud CLI for macOS/arm64"
run = "mise run build:uncloud macos arm64"
outputs = ["uncloud-macos-arm64"]

[tasks."build:all"]
description = "Build all release binaries (uncloudd + uncloud CLI for all platforms)"
depends = [
  "build:uncloudd-amd64",
  "build:uncloudd-arm64",
  "build:uncloud-linux-amd64",
  "build:uncloud-linux-arm64",
  "build:uncloud-macos-amd64",
  "build:uncloud-macos-arm64",
]

[tasks."mise:lock"]
description = "Update mise.lock with hashes for all platforms"
run = "mise lock --platform linux-x64,macos-arm64"

[tasks.proto]
description = "Regenerate gRPC API code from .proto files"
run = """
protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative \
  --proto_path=. --proto_path=internal/machine/api/vendor internal/machine/api/pb/*.proto
"""

[tasks.uc]
description = "Run the Uncloud CLI"
run = "go run ./cmd/uncloud"

[tasks.ucind]
description = "Run ucind CLI for managing local Docker-based clusters"
run = "go run ./cmd/ucind"

[tasks."ucind:image"]
description = "Build the ucind Docker image"
run = "docker build -t {{vars.ucind_image}} --target ucind ."

[tasks."ucind:cleanup"]
description = "Remove ucind managed containers and networks"
run = """
echo "==> Removing ucind managed containers..."
docker ps --filter "label=ucind.managed" -q | xargs docker rm -f
echo "==> Removing ucind managed networks..."
docker network ls --filter "label=ucind.managed" -q | xargs docker network rm -f
"""
